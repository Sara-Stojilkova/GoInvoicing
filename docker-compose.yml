services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goinvoicing
      POSTGRES_USER: goinvoicing
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goinvoicing"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://goinvoicing:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/goinvoicing
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  task-ui:
    build: ./task-ui
    ports:
      - "5173:80"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
